<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Planner</title>
  </head>
  <body>
    <div id="wrapper">
      <div id="sidebar">
        <div class="title"><b>Study planner</b></div>
        <div class="options">
          <div class="dashboard">Dashboard</div>
          <div class="projects">Projects</div>
          <div class="settings">Settings</div>
        </div>
        <div class="account">Isa Ismail</div>
      </div>
      <div id="view">
        <div class="greeting">
          <h1>Welcome Isa</h1>
          <p>[insert today's date], Let's make today productive!</p>
        </div>
        <div class="cardsOne">
          <div class="one">
            <div class="icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                id="Layer_1"
                data-name="Layer 1"
                viewBox="0 0 24 24"
                width="37"
                height="37"
                fill="white"
              >
                <path
                  d="M3,22H24v2H3c-1.654,0-3-1.346-3-3V0H2V21c0,.551,.449,1,1,1ZM17,5v2h3.586l-5.586,5.586-4-4-6.707,6.707,1.414,1.414,5.293-5.293,4,4,7-7v3.586h2V5h-7Z"
                />
              </svg>
            </div>
            <div class="text">
              85%
              <p>weekly progress</p>
            </div>
          </div>
          <div class="two">
            <div class="icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                id="Layer_1"
                data-name="Layer 1"
                viewBox="0 0 24 24"
                width="37"
                height="37"
                fill="white"
              >
                <path
                  d="M21,2h-3V0h-2V2H8V0h-2V2H3C1.346,2,0,3.346,0,5V24H24V5c0-1.654-1.346-3-3-3ZM3,4H21c.552,0,1,.449,1,1v3H2v-3c0-.551,.448-1,1-1Zm-1,18V10H22v12H2Zm3-9h14v2H5v-2Zm0,4h7v2H5v-2Z"
                />
              </svg>
            </div>
            <div class="text">
              7 day
              <p>study streak</p>
            </div>
          </div>
          <div class="three">
            <div class="icon">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                id="Layer_1"
                data-name="Layer 1"
                viewBox="0 0 24 24"
                width="37"
                height="37"
                fill="white"
              >
                <path
                  d="M12,24C5.383,24,0,18.617,0,12S5.383,0,12,0s12,5.383,12,12-5.383,12-12,12Zm0-22C6.486,2,2,6.486,2,12s4.486,10,10,10,10-4.486,10-10S17.514,2,12,2Zm5,9h-4V5h-2V13h6v-2Z"
                />
              </svg>
            </div>
            <div class="text">
              15
              <p>total hours</p>
            </div>
          </div>
        </div>
        <div class="cardsTwo">
          <div class="one">timer</div>
          <div class="two">
            <div>Upcoming deadlines</div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
